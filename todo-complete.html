<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>To-Do List</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f4; }\n        h1 { color: #333; }\n        #todo-form { margin-bottom: 20px; }\n        input[type='text'] { padding: 10px; width: 300px; }\n        button { padding: 10px; margin-left: 5px; }\n        ul { list-style-type: none; padding: 0; }\n        li { padding: 10px; background: #fff; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }\n        .completed { text-decoration: line-through; color: grey; }\n    </style>\n</head>\n<body>\n    <h1>My To-Do List</h1>\n    <div id="todo-form">\n        <input type="text" id="todo-input" placeholder="Add a new task...">\n        <button id="add-btn">Add</button>\n    </div>\n    <ul id="todo-list"></ul>\n    <div id="task-counter">Total Tasks: <span id="task-count">0</span></div>\n    <button id="clear-completed-btn">Clear Completed</button>\n    <script>\n        const todoInput = document.getElementById('todo-input');\n        const addButton = document.getElementById('add-btn');\n        const todoList = document.getElementById('todo-list');\n        const taskCount = document.getElementById('task-count');\n        const clearCompletedButton = document.getElementById('clear-completed-btn');\n\n        let todos = JSON.parse(localStorage.getItem('todos')) || [];\n\n        function renderTodos() {\n            todoList.innerHTML = '';\n            todos.forEach((todo, index) => {\n                const li = document.createElement('li');\n                li.innerHTML = `<span class=\\\"${todo.completed ? 'completed' : ''}\\\">${todo.text}</span> <button onclick=\\\"editTodo(${index})\\\">Edit</button> <button onclick=\\\"deleteTodo(${index})\\\">Delete</button> <button onclick=\\\"completeTodo(${index})\\\">${todo.completed ? 'Undo' : 'Complete'}</button>`;\n                todoList.appendChild(li);\n            });\n            taskCount.textContent = todos.length;\n        }\n\n        function addTodo() {\n            const todoText = todoInput.value.trim();\n            if (todoText) {\n                todos.push({ text: todoText, completed: false });\n                localStorage.setItem('todos', JSON.stringify(todos));\n                renderTodos();\n                todoInput.value = '';\n            }\n        }\n\n        function editTodo(index) {\n            const newText = prompt('Edit task:', todos[index].text);\n            if (newText) {\n                todos[index].text = newText;\n                localStorage.setItem('todos', JSON.stringify(todos));\n                renderTodos();\n            }\n        }\n\n        function deleteTodo(index) {\n            todos.splice(index, 1);\n            localStorage.setItem('todos', JSON.stringify(todos));\n            renderTodos();\n        }\n\n        function completeTodo(index) {\n            todos[index].completed = !todos[index].completed;\n            localStorage.setItem('todos', JSON.stringify(todos));\n            renderTodos();\n        }\n\n        function clearCompleted() {\n            todos = todos.filter(todo => !todo.completed);\n            localStorage.setItem('todos', JSON.stringify(todos));\n            renderTodos();\n        }\n\n        addButton.addEventListener('click', addTodo);\n        clearCompletedButton.addEventListener('click', clearCompleted);\n        renderTodos();\n    </script>\n</body>\n</html>
