<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="todo-styles.css">
    <title>To-Do List Application</title>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button id="addTaskButton">Add Task</button>
        <div class="taskCounter">Total Tasks: <span id="taskCount">0</span></div>
        <ul id="taskList"></ul>
        <button id="clearCompletedButton">Clear Completed Tasks</button>
        <div class="filterButtons">
            <button id="filterAll">All</button>
            <button id="filterActive">Active</button>
            <button id="filterCompleted">Completed</button>
        </div>
    </div>
    <script src="todo-script.js"></script>
</body>
</html>
